<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mi primera web</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #18202a;
      background: #f5f7fb;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .page {
      width: min(920px, 100%);
      display: grid;
      gap: 28px;
    }

    .hero {
      padding: clamp(32px, 7vw, 72px);
      color: #ffffff;
      background:
        linear-gradient(rgba(12, 22, 35, 0.72), rgba(12, 22, 35, 0.72)),
        url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=1600&q=80");
      background-position: center;
      background-size: cover;
      border-radius: 8px;
      box-shadow: 0 24px 70px rgba(24, 32, 42, 0.22);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.4rem, 7vw, 5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      max-width: 660px;
      font-size: clamp(1.05rem, 2vw, 1.3rem);
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 6px;
      color: #18202a;
      background: #ffffff;
      font-weight: 700;
      text-decoration: none;
    }

    .note {
      padding: 18px 0 0;
      color: #46515f;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <main>
    <section class="page" aria-labelledby="titulo">
      <div class="hero">
        <h1 id="titulo">Mi primera web</h1>
        <p>
          Hola, soy JOSIORDAX. Esta es mi primera página publicada desde GitHub.
        </p>
        <div class="actions">
          <a href="https://github.com/JOSIORDAX/mi-primera-web">Ver repositorio</a>
        </div>
      </div>
      <p class="note">
        Lista para seguir creciendo con nuevas secciones, imágenes y estilos.
      </p>
    </section>
  </main>
</body>
</html>
